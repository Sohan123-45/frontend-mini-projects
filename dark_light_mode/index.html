<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light and Dark Mode</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s;
        }
        .container{
            height: 50px;
            width: 50px;
            background-color: lightgray;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border-radius: 50%;
        }
        .hidden{
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="light_mode">
            <img src="light_mode.svg" alt="">
        </div>
        <div id="dark_mode">
            <img src="dark_mode.svg"alt="">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
