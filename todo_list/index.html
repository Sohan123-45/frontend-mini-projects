<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <style>
        body{
            background-color: rgb(222, 222, 222);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .todo{
            background-color: rgb(246, 243, 243);
            border-radius: 10px;
            padding: 18px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }
        .input-row {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .todo-list {
            flex-grow: 1;
        }
        .head{
            font-family: cursive;
            color: rgb(113, 0, 199);
            font-weight: bold;
            margin-left: 60px;
        }
        .todo>#input-text{
            border: none;
            padding: 5px;
            border-radius: 3px;
            border: 1px solid gray;
        }
        .todo .add{
            border: none;
            background-color: rgb(113, 0, 199);
            width: 25px;
            height: 25px;
            border-radius: 3px;
            color: white;
            cursor: pointer;
        }
        .todo .add:hover{
            background-color: rgb(156, 27, 255);
            color: rgb(240, 239, 239);
        }
        ul{
            padding: 0px;
        }
        ul>li{
            list-style: none;
            padding: 3px;
            margin-bottom: 6px;
            border-radius: 3px;
            background-color: rgb(240, 239, 239);
        }
        .todo>.clear{
            border: none;
            border-radius: 3px;
            background-color: rgb(113, 0, 199);
            color: white;
            padding: 5px 7px;
            left: 139px;
            top: 180px;
            cursor: pointer;
        }
        .todo>.clear:hover{
            background-color: rgb(156, 27, 255);
            color: rgb(240, 239, 239);
        }
    </style>
</head>
<body>
    <div class="todo">
        <p class="head">Todo List</p>
        <div class="input-row">
            <input type="text" placeholder="Enter your todo" id="input-text">
            <button class="add"><i class="fas fa-plus"></i></button>
        </div>
        <ul class="todo-list"></ul>
        <button class="clear">Clear All</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
