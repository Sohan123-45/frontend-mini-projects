<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #8300c463;
        }
        .container{
            padding: 15px;
            border-radius: 10px;
            background-color: #31004a;
        }
        .container>.heading{
            margin-bottom: 5px;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
        .container input{
            border: 0px;
            border-radius: 5px;
            padding: 5px;
            width: 95%;
            height: 20px;
            border: 0.8px solid #ab00ff;
            margin-bottom: 5px;
        }
        .container button{
            border: 0px;
            margin-top: 5px;
            padding: 5px;
            width: 100%;
            border-radius: 5px;
            background-color:#4c00a4;
            color: white;
            font-weight: 600;
            box-shadow: 3px 0px 5px #751b42;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .container button:hover{
            transform: scale(1.02);
        }
        .container button:active{
            transform: translateY(1px);
        }
        .container>.qr_class{
            margin: 10px;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heading"><h1>QR Generator</h1></div>
        <input type="text" placeholder="Enter text or link" id="inp">
        <div class="qr_class">
            <img src="" alt="" id="qr">
        </div>
        <button class="generate">Generate the QR</button>
    </div>

    <script>
        let inp=document.querySelector("#inp");
        let qr=document.querySelector("#qr");
        document.querySelector(".generate").addEventListener("click",()=>{
            qr.src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+inp.value;
        })
    </script>
</body>
</html>
